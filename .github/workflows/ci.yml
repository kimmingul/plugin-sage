name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run structural test harness
        run: bash tests/validate-structure.sh
